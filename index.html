<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom styles for the patriotic theme and smooth scrolling */
        /* IMPORTANT: Updated to 'Mr Dafoe' font for the signature effect */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Mr+Dafoe&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc; /* Cleaner off-white */
        }
        /* True American Colors (Deeper, richer shades) */
        .text-usa-red { color: #B22234; } /* Flag Red (Crimson) */
        .bg-usa-red { background-color: #B22234; }
        .text-usa-blue { color: #182A45; } /* Deeper Navy Navy Blue */
        .bg-usa-blue { background-color: #182A45; }
        .border-usa-red { border-color: #B22234; }
        .border-usa-blue { border-color: #182A45; }

        /* Enhanced Header Stripes Pattern - More prominent */
        .header-stripes {
            background-color: white;
            /* Creates a slightly thicker diagonal red and white stripe pattern for boldness */
            background-image: repeating-linear-gradient(
                -45deg,
                #B22234 0,
                #B22234 12px,
                #fcfcfc 12px,
                #fcfcfc 24px 
            );
            background-size: 100% 100%;
            box-shadow: 0 8px 10px rgba(0, 0, 0, 0.15); /* Stronger shadow */
        }
        
        /* Ensure scroll behavior is smooth for internal links */
        html {
            scroll-behavior: smooth;
        }
        
        /* Custom class for the wide logo image */
        .wide-logo {
            width: 100%;
            height: auto;
            max-height: 25rem;
            object-fit: contain;
        }
        
        /* Reduce height on smaller screens to prevent intrusion */
        @media (max-width: 768px) {
            .wide-logo {
                max-height: 12rem;
            }
        }
        /* Animation for the star icon in the header */
        @keyframes pulse-flag {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .animate-pulse-flag {
            animation: pulse-flag 2s infinite ease-in-out;
        }

        /* Signature Font Styling for 'Specialist' */
        .font-signature {
            font-family: 'Mr Dafoe', cursive; /* Applied the new font */
            color: #B22234; /* usa-red for a strong patriotic contrast against navy blue */
            display: inline-block;
            font-size: 1.5em; /* Increased size slightly for Mr Dafoe */
            line-height: 0.8;
            font-weight: 400; 
            transform: translateY(-8px); 
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.4); 
        }
        /* Responsive adjustments for the signature font on desktop */
        @media (min-width: 640px) {
            .font-signature {
                font-size: 1.8em; /* Even larger on desktop */
            }
        }

        /* --- SLIDESHOW CUSTOM STYLES --- */

        .slideshow-container {
            position: relative;
            max-width: 1400px;
        }
        .mySlides {
            display: none;
            border-radius: 0.75rem; 
            overflow: hidden;
        }
        .mySlides img {
            height: 60vh; /* Consistent height for slides */
            width: 100%;
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .mySlides img {
                height: 40vh;
            }
        }

        /* Next & previous buttons */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            user-select: none;
            background-color: rgba(24, 42, 69, 0.6); /* usa-blue with opacity */
            border-radius: 9999px; /* Rounded buttons */
            z-index: 10;
        }
        .prev {
            left: 20px;
        }
        .next {
            right: 20px;
        }
        .prev:hover, .next:hover {
            background-color: rgba(24, 42, 69, 0.9);
        }

        /* Caption text */
        .text-caption {
            color: #f2f2f2;
            font-size: 18px;
            padding: 8px 12px;
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-weight: 600;
        }
        .numbertext {
            color: #f2f2f2;
            font-size: 12px;
            padding: 8px 12px;
            position: absolute;
            top: 0;
        }

        /* The dots/bullets/indicators */
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
            border: 2px solid #bbb;
        }
        
        .active-dot {
            background-color: #B22234; /* usa-red fill */
            border-color: #182A45; /* usa-blue border */
        }
        .dot:hover {
            background-color: #B22234; 
            border-color: #182A45;
        }


        /* Fading animation */
        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }
        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
        /* Custom Coupon Style */
        .coupon-border {
            border: 4px dashed #B22234; /* Dashed red border */
            background-image: radial-gradient(circle, #fcfcfc 10%, transparent 10%), radial-gradient(circle, #fcfcfc 10%, transparent 10%);
            background-size: 20px 20px; /* Adjust size for the torn look */
            background-position: top left, bottom right;
        }
    </style>
</head>

    <script>
        // --- I18N SETUP ---
        let LANG = {}; // Variable to hold translations

        // Helper function to apply translations to static elements (header, footer)
        function initializeStaticI18n() {
            if (!LANG || Object.keys(LANG).length === 0) return;

            document.getElementById('page-title').textContent = t('meta.title');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (key) {
                    const ariaKey = el.getAttribute('data-i18n-aria-label');
                    if (ariaKey) {
                        el.setAttribute('aria-label', t(ariaKey));
                    }
                    el.textContent = t(key);
                }
            });
        }

        async function loadLanguageFile(filename) {
            try {
                // Use fetch to load the JSON file
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                LANG = await response.json(); // Assign the parsed JSON to the global LANG variable
                
                // Define the content variables ONLY after LANG is loaded
                initializeContentStrings(); 
                
                // SEO FIX: Call handleRouting to render the initial page based on the URL
                handleRouting(); 
                
                // Final app initialization steps
                initializeApp(); 
            } catch (error) {
                console.error("Could not load language file:", error);
                // Fallback to a minimal structure for error handling if fetch fails
                LANG = { 
                    "meta": { "title": "Error Loading" }, 
                    "nav": { 
                        "toggle_menu_aria_label": "Toggle Menu",
                        "link_showcase": "Showcase",
                        "link_services": "Services",
                        "link_gallery": "Gallery",
                        "link_coupons": "Coupons",
                        "link_products": "Products",
                        "link_reviews": "Reviews",
                        "link_about": "About",
                        "button_quote_desktop": "Request Quote",
                        "button_quote_mobile": "Quote"
                    },
                    "footer": {
                        "copyright": "Error Loading Content. Check console for details.",
                        "license": "",
                        "tagline": ""
                    }
                };
                initializeContentStrings(); // Init content with minimal fallback
                handleRouting(); 
                initializeApp(); 
            }
        }
        
        function t(key, placeholders = {}) {
            const keys = key.split('.');
            let value = LANG;
            for (const k of keys) {
                if (!value || typeof value !== 'object' || !(k in value)) {
                    // Fallback to the key itself if not found
                    console.warn(`Translation key not found: ${key}`);
                    return key; 
                }
                value = value[k];
            }
            
            let translatedString = String(value);

            // Simple placeholder replacement logic (e.g., {deals} -> Deals)
            for (const [placeholderKey, replacementValue] of Object.entries(placeholders)) {
                translatedString = translatedString.replace(`{${placeholderKey}}`, replacementValue);
            }

            return translatedString;
        }
        // --- END I18N SETUP ---


        // --- Yelp Widget Re-Initialization Logic (Extracted from the original IIFE) ---
        // This function must be called after the homePageContent is injected into the DOM.
        function initializeYelpWidgets() {
            // Function n: GA tracking init
            function n(e) { var t = document.querySelector("iframe.yelp-ga-tracker"), r = { hitType: "pageview", embedLocation: window.location.host, embedLocationPath: window.location.pathname, embedLocationQuery: window.location.search }, n = window.JSON.stringify(r); if(t && t.contentWindow) t.contentWindow.postMessage(n, e + "/ga") }
            
            // Function i: Message listener (handles resizing and GA events)
            function i(e, t) {
                try {
                    var r = window.JSON.parse(e.data);
                    if ("gaInit" === r.action) return void n(t);
                    for (var i = document.querySelectorAll('iframe.yelp-review[data-review-id="' + r.reviewID + '"]'), o = document.querySelector("iframe.yelp-ga-tracker"), a = 0; a < i.length; a++) {
                        var d = i[a];
                        if (d.contentWindow === e.source) {
                            if (d.style.height = r.reviewHeight + "px", "resize" === r.action) return;
                            if (d.parentNode && d.nextSibling && d.parentNode.removeChild(d.nextSibling), o) {
                                var c = { hitType: "event", reviewID: r.reviewID }, l = window.JSON.stringify(c);
                                if(o.contentWindow) o.contentWindow.postMessage(l, t + "/ga");
                            }
                            return;
                        }
                    }
                } catch(error) {
                    console.error("Error processing Yelp widget message:", error);
                }
            }
            
            // Function o: Creates the review iframe
            function o(e, t, r) {
                var n = t + "/review/" + r + "?embed_location=" + window.location.host, i = document.createElement("iframe");
                i.setAttribute("data-review-id", r);
                i.classList.add("yelp-review");
                i.src = n;
                i.scrolling = "no";
                i.style.display = "block";
                i.style.maxWidth = "700px";
                i.style.minWidth = "320px";
                i.style.width = "100%";
                i.style.height = "0";
                i.style.border = "0";
                if (e.parentNode) e.parentNode.insertBefore(i, e);
            }
            
            // Function a: Main initialization logic
            function a() {
                if (document.querySelectorAll && window.postMessage && window.JSON) {
                    var e = document.querySelectorAll("span.yelp-review[data-review-id]"), t = document.querySelector("iframe.yelp-ga-tracker");
                    
                    if (e.length) {
                        if (!t) {
                            var r = "https://" + String(e[0].getAttribute("data-hostname")) + "/embed";
                            // Only add the message listener once
                            if (!window._yelp_listener_added) {
                                window.addEventListener("message", function(e) { i(e, r) }, false);
                                window._yelp_listener_added = true;
                            }
                            t = document.createElement("iframe");
                            t.classList.add("yelp-ga-tracker");
                            t.src = r + "/ga";
                            t.style.display = "none";
                            if (document.body) document.body.appendChild(t);
                        }
                        for (var n = 0; n < e.length; n++) {
                            var a = String(e[n].getAttribute("data-review-id")), d = String(e[n].getAttribute("data-hostname")), c = "https://" + d + "/embed";
                            e[n].removeAttribute("data-review-id"); // The logic removes this attribute, so subsequent calls won't double-embed
                            o(e[n], c, a);
                        }
                    }
                }
            }
            a(); // Execute the core logic
        }
        // --- End Yelp Widget Logic ---


        // --- Slideshow Logic (Moved out of DOMContentLoaded for dynamic use) ---
        let slideIndex = 1;

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            
            if (slides.length === 0) return; // Exit if no slides are present

            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            
            for (i = 0; i < dots.length; i++) {
                dots[i].classList.remove("active-dot");
            }
            
            slides[slideIndex-1].style.display = "block";
            dots[slideIndex-1].classList.add("active-dot");
        }
        
        function plusSlides(n) {
            slideIndex += n;
            showSlides(slideIndex);
        }

        function currentSlide(n) {
            slideIndex = n;
            showSlides(slideIndex);
        }

        // Auto-play interval reference
        let slideshowInterval;
        function startSlideshow() {
            // Clear any existing interval to prevent overlap
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(() => {
                plusSlides(1);
            }, 5000);
        }

        // --- End Slideshow Logic ---


        // --- Form Helper ---
        function displayFormMessage(message, type) {
            let messageElement = document.getElementById('form-message');
            if (!messageElement) {
                return;
            }
            messageElement.classList.remove('hidden');
            // Use translation for error message
            const messageKey = type === 'error' ? 'home.form_error_missing_fields' : 'home.form_success_message';
            messageElement.textContent = t(messageKey);

            messageElement.classList.remove('bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            if (type === 'error') {
                messageElement.classList.add('bg-red-100', 'text-red-800');
            } else {
                messageElement.classList.add('bg-green-100', 'text-green-800');
            }
            
            // Hide message after 5 seconds
            setTimeout(() => {
                messageElement.classList.add('hidden');
            }, 5000);
        }

        function handleFormSubmission(event) {
            event.preventDefault();

            const form = document.getElementById('service-request-form');
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const issue = document.getElementById('issue').value;

            if (!name || !phone || !issue) {
                // NOTE: Assumes t('home.form_error_missing_fields') exists in en.json
                displayFormMessage('', 'error'); 
                return;
            }

            const subject = encodeURIComponent(`Service Request from ${name}`);
            const body = encodeURIComponent(`Name: ${name}\nPhone: ${phone}\n\nService Need:\n${issue}`);

            // Direct mailto link (best cross-browser approach)
            const mailtoLink = `mailto:allamericandoorcompany@gmail.com?subject=${subject}&body=${body}`;
            window.location.href = mailtoLink;

            // Now uses translated success message via displayFormMessage
            // NOTE: Assumes t('home.form_success_message') exists in en.json
            displayFormMessage('', 'success'); 
            form.reset();
        }
        // --- End Form Helper ---


        // Global variables that hold the content HTML strings
        let homePageContent = '';
        let detailedServicesContent = '';
        let couponsContent = '';
        let galleryContent = '';
        
        // Function to define the content strings, called after LANG is loaded
        function initializeContentStrings() {
             // --- Original Home Page Content (Saved as a string variable) --- 
             // Text strings replaced with t() function calls
             homePageContent = ` 
                <main class="py-4"> 
                    <section id="hero" class="bg-usa-blue text-white py-20 md:py-32 rounded-b-lg shadow-2xl border-b-8 border-usa-red"> 
                        <div class="container mx-auto px-4 text-center"> 
							<h2 class="text-4xl sm:text-7xl font-bold mb-3 tracking-widest uppercase"> 
                                Site is Currently Under Construction
                            </h2> 
						
							<a href="tel:951-684-1567" class="inline-block px-12 py-5 bg-usa-red text-white font-black text-2xl rounded-lg shadow-2xl hover:bg-red-700 transform hover:scale-105 transition duration-300 border-4 border-white uppercase tracking-wider"> 
                                 
                            
                            <h2 class="text-4xl sm:text-7xl font-bold mb-3 tracking-widest uppercase"> 
                                ${t('home.hero_callnow')}
                            </h2> 
							<h2 class="text-3xl sm:text-5xl font-bold mb-3 tracking-widest uppercase"> 
                                <span class="text-usa-blue">${t('home.hero_number')}</span>
                            </h2> 
							</a>
							<h2 class="text-xl sm:text-2xl font-semibold mb-3 tracking-widest uppercase"> 
                                ${t('home.hero_tagline_top').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')} 
                            </h2> 
                            <h1 class="text-4xl sm:text-6xl font-black mb-6 leading-tight border-b-4 border-white inline-block pb-1"> 
                                ${t('home.hero_title', { signature_specialist: `<span class="font-signature">${t('home.hero_title_signature_part')}</span>` })} 
                            </h1> 
                            <p class="text-lg sm:text-2xl font-light mb-10 max-w-4xl mx-auto italic"> 
                                ${t('home.hero_slogan')} 
                            </p> 
                            <a href="/" class="inline-block px-12 py-5 bg-usa-red text-white font-black text-2xl rounded-lg shadow-2xl hover:bg-red-700 transform hover:scale-105 transition duration-300 border-4 border-white uppercase tracking-wider" onclick="navigateToHomeSection(event, 'contact-us')"> 
                                <i class="fas fa-handshake mr-3"></i> ${t('home.hero_cta')} 
                            </a> 
                        </div> 
                    </section> 
					<!-- Remove Sections

        // --- Navigation Functions (Updated for History API) ---

        // Helper function to handle the actual content injection and animation
        function renderContent(contentHtml, pageName, scrollTargetId = null) {
            const container = document.getElementById('main-content-area');
            if (!container) return;

            // 1. Fade out current content
            container.style.opacity = 0;

            // Wait for fade out animation
            setTimeout(() => {
                // 2. Insert new content
                container.innerHTML = contentHtml;
                
                // 3. Page-specific post-render fixups
                if (pageName === 'home') {
                    // 1. Re-initialize Yelp widgets
                    initializeYelpWidgets(); 

                    // 2. Re-initialize Slideshow
                    const slides = document.getElementsByClassName("mySlides");
                    if (slides.length > 0) {
                        slideIndex = 1; // Reset slide
                        showSlides(slideIndex);
                        startSlideshow(); // Start auto-play
                    } else {
                        // Stop slideshow if not present
                        if (slideshowInterval) clearInterval(slideshowInterval);
                    }
                } else {
                    // Stop slideshow on other pages
                    if (slideshowInterval) clearInterval(slideshowInterval);
                }
                
                // Re-attach form handler if contact section is present
                const form = document.getElementById('service-request-form');
                if (form) {
                    form.onsubmit = handleFormSubmission;
                }

                // Scroll to target element after content swap
                if (scrollTargetId) {
                    scrollToElement(null, scrollTargetId); // Use local helper
                } else {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }

                // 4. Fade in new content
                container.style.opacity = 1;

            }, 300); // Wait for fade out animation
        }
        
        // SEO FIX 1: Core Navigation function using History API
        function navigateTo(event, path, contentHtml, pageName, scrollTargetId = null) {
            if (event) event.preventDefault();
            
            // Push the new state to the browser history
            history.pushState({ page: pageName, scrollId: scrollTargetId }, '', path);
            
            // Render the content
            renderContent(contentHtml, pageName, scrollTargetId);
        }
        
        // Updated individual navigation functions
        function navigateToHomeSection(event, scrollTargetId = null) {
            // Note: Home page paths are just the root /, but we pass the section ID for scrolling.
            navigateTo(event, '/', homePageContent, 'home', scrollTargetId);
        }

        function navigateToServicesPage(event) {
            navigateTo(event, '/services', detailedServicesContent, 'services', null);
        }
        
        function navigateToCouponsPage(event) {
            navigateTo(event, '/coupons', couponsContent, 'coupons', null);
        }

        function navigateToGalleryPage(event) {
            navigateTo(event, '/gallery', galleryContent, 'gallery', null);
        }
        
        function scrollToElement(event, id) {
             if (event) event.preventDefault();
             const element = document.getElementById(id);
             if (element) {
                 element.scrollIntoView({ behavior: 'smooth' });
             }
        }
        
        // SEO FIX 2: Function to parse the URL path and load the correct page
        function handleRouting() {
            // Get the current URL path
            const path = window.location.pathname;
            const scrollTargetId = window.location.hash ? window.location.hash.substring(1) : null;
            
            // Route logic
            switch (path) {
                case '/services':
                    renderContent(detailedServicesContent, 'services', null);
                    break;
                case '/gallery':
                    renderContent(galleryContent, 'gallery', null);
                    break;
                case '/coupons':
                    renderContent(couponsContent, 'coupons', null);
                    break;
                case '/':
                default:
                    renderContent(homePageContent, 'home', scrollTargetId);
                    // Ensure the root path is correct in the browser bar if we hit default
                    if (path !== '/') {
                        history.replaceState({ page: 'home', scrollId: scrollTargetId }, '', '/');
                    }
                    break;
            }
            
            // Update the static text (title, header, footer) with new translation
            initializeStaticI18n(); 
        }
        
        // --- Master Initialization Function ---
        function initializeApp() {
            const hamburgerButton = document.getElementById('hamburger-button');
            const mobileMenu = document.getElementById('mobile-menu');

            // SEO FIX 2: Add popstate listener for back/forward buttons
            window.addEventListener('popstate', handleRouting);

            // 1. Hamburger Menu Toggle Functionality
            if (hamburgerButton) {
                hamburgerButton.addEventListener('click', function() {
                    mobileMenu.classList.toggle('hidden');
                });
            }
            
            // Add click listeners to close menu (needed for mobile links)
            const mobileLinks = document.querySelectorAll('.mobile-nav-link');
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                });
            });

            // Set initial fade transition
            const container = document.getElementById('main-content-area');
            if (container) {
                container.style.transition = 'opacity 0.3s ease-in-out';
            }
        }
        
        // --- Final DOMContentLoaded Listener (Starts the whole process) ---
        document.addEventListener('DOMContentLoaded', function() {
            // Load the language file first. 
            // Once loaded, it calls initializeContentStrings() and handleRouting()
            loadLanguageFile('en.json'); 
        });
    </script>
